<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SentenceCraft — Учи английский</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg-primary: #0a0a0f; --bg-secondary: #12121a; --bg-card: #1a1a2e;
            --bg-input: #16213e; --text-primary: #e0e0ff; --text-secondary: #8888aa;
            --accent: #00f0ff; --accent-hover: #00d4e0; --accent-glow: rgba(0,240,255,0.3);
            --success: #00ff88; --error: #ff3366; --warning: #ffaa00;
            --border: rgba(0,240,255,0.2);
            --font-mono: ui-monospace, SFMono-Regular, 'SF Mono', Menlo, Consolas, monospace;
        }
        .theme-github {
            --bg-primary: #0d1117; --bg-secondary: #161b22; --bg-card: #21262d;
            --bg-input: #0d1117; --text-primary: #e6edf3; --text-secondary: #8b949e;
            --accent: #58a6ff; --accent-hover: #79b8ff; --accent-glow: rgba(88,166,255,0.25);
            --success: #3fb950; --error: #f85149; --warning: #d29922;
            --border: rgba(48,54,61,0.7);
        }
        .theme-light {
            --bg-primary: #f5f7fa; --bg-secondary: #ffffff; --bg-card: #f0f2f5;
            --bg-input: #e8ebf0; --text-primary: #1a1a2e; --text-secondary: #6b7280;
            --accent: #3b82f6; --accent-hover: #2563eb; --accent-glow: rgba(59,130,246,0.25);
            --success: #10b981; --error: #ef4444; --warning: #f59e0b;
            --border: rgba(0,0,0,0.12);
        }
        body { font-family: system-ui, -apple-system, sans-serif; background: var(--bg-primary); color: var(--text-primary); min-height: 100vh; overflow-x: hidden; transition: background 0.4s, color 0.4s; }
        body.theme-cyberpunk::before { content: ''; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,240,255,0.02) 2px, rgba(0,240,255,0.02) 4px); pointer-events: none; z-index: 9999; }
        .app-container { max-width: 900px; margin: 0 auto; padding: 20px; min-height: 100vh; position: relative; }
        .header { text-align: center; padding: 30px 0 20px; }
        .header h1 { font-family: var(--font-mono); font-size: 2rem; font-weight: 700; background: linear-gradient(135deg, var(--accent), var(--success)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; margin-bottom: 8px; }
        .theme-cyberpunk .header h1 { animation: glitch 3s infinite; }
        @keyframes glitch { 0%,95%,100%{transform:translate(0);} 96%{transform:translate(-2px,1px);} 97%{transform:translate(2px,-1px);} 98%{transform:translate(-1px,-1px);} 99%{transform:translate(1px,1px);} }
        .header p { color: var(--text-secondary); font-size: 0.95rem; }

        .controls-bar { display: flex; gap: 10px; justify-content: center; margin: 20px 0; flex-wrap: wrap; align-items: center; }
        .control-group { display: flex; gap: 2px; border: 1px solid var(--border); border-radius: 20px; overflow: hidden; }
        .control-btn { padding: 6px 16px; border: none; background: var(--bg-card); color: var(--text-secondary); cursor: pointer; font-size: 0.8rem; font-weight: 600; transition: all 0.3s; letter-spacing: 0.5px; }
        .control-btn:hover { color: var(--accent); }
        .control-btn.active { background: var(--accent); color: #fff; }
        .theme-light .control-btn.active { color: #000; }
        .theme-btn { padding: 6px 16px; border: 1px solid var(--border); border-radius: 20px; background: var(--bg-card); color: var(--text-secondary); cursor: pointer; font-size: 0.8rem; font-weight: 500; transition: all 0.3s; display: inline-flex; align-items: center; gap: 6px; }
        .theme-btn:hover { border-color: var(--accent); color: var(--accent); }
        .theme-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
        .theme-light .theme-btn.active { color: #000; }
        .theme-btn svg { width: 16px; height: 16px; fill: currentColor; }
        .theme-btn.active svg { fill: #fff; }
        .theme-light .theme-btn.active svg { fill: #000; }

        .storage-info { display: inline-block; padding: 4px 10px; border-radius: 20px; font-size: 0.7rem; font-family: var(--font-mono); margin-top: 8px; background: rgba(0,255,136,0.15); color: var(--success); border: 1px solid var(--success); }
        .theme-light .storage-info { background: rgba(16,185,129,0.1); }

        .upload-area { border: 2px dashed var(--border); border-radius: 16px; padding: 40px; text-align: center; background: var(--bg-secondary); transition: all 0.3s; margin: 20px 0; position: relative; overflow: hidden; cursor: pointer; }
        .upload-area:hover { border-color: var(--accent); background: var(--bg-card); }
        .upload-area.dragover { border-color: var(--accent); background: var(--accent-glow); }
        .upload-area.loaded { border-color: var(--success); border-style: solid; }
        .upload-area input[type="file"] { position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0; cursor: pointer; z-index: 2; }
        .upload-content { pointer-events: none; position: relative; z-index: 1; }
        .upload-icon { font-size: 3rem; margin-bottom: 12px; }
        .upload-area h3 { font-size: 1.1rem; margin-bottom: 8px; }

        .paste-area {
            margin: 15px 0; border: 2px solid var(--border); border-radius: 12px;
            background: var(--bg-secondary); overflow: hidden; transition: border-color 0.3s;
        }
        .paste-area:focus-within { border-color: var(--accent); }
        .paste-area.has-content { border-color: var(--warning); }
        .paste-header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 10px 16px; background: var(--bg-card); border-bottom: 1px solid var(--border);
        }
        .paste-header span { font-size: 0.9rem; font-weight: 600; color: var(--text-primary); display: flex; align-items: center; gap: 8px; }
        .paste-header span kbd {
            display: inline-block; padding: 2px 6px; border: 1px solid var(--border); border-radius: 4px;
            font-family: var(--font-mono); font-size: 0.7rem; color: var(--text-secondary);
            background: var(--bg-input);
        }
        .parse-btn {
            padding: 5px 14px; border: 1px solid var(--accent); border-radius: 6px;
            background: transparent; color: var(--accent); cursor: pointer; font-size: 0.8rem;
            font-weight: 600; transition: all 0.2s;
        }
        .parse-btn:hover { background: var(--accent); color: #000; }
        .parse-btn:disabled { opacity: 0.4; cursor: not-allowed; background: transparent; color: var(--text-secondary); border-color: var(--text-secondary); }
        .theme-light .parse-btn:hover { color: #000; }
        .paste-textarea {
            width: 100%; min-height: 120px; padding: 14px 16px; border: none;
            background: transparent; color: var(--text-primary); font-family: var(--font-mono);
            font-size: 0.85rem; line-height: 1.6; resize: vertical; outline: none;
        }
        .paste-textarea::placeholder { color: var(--text-secondary); font-style: italic; }
        .paste-textarea::-webkit-scrollbar { width: 5px; }
        .paste-textarea::-webkit-scrollbar-track { background: transparent; }
        .paste-textarea::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 3px; }

        .paste-results {
            margin-top: 0; padding: 10px 16px; background: rgba(0,255,136,0.08);
            border-top: 1px solid var(--border); font-size: 0.85rem; color: var(--success);
            font-weight: 500; display: none;
        }
        .paste-results.visible { display: block; }
        .paste-error {
            margin-top: 0; padding: 10px 16px; background: rgba(255,51,102,0.08);
            border-top: 1px solid var(--border); font-size: 0.85rem; color: var(--error);
            font-weight: 500; display: none;
        }
        .paste-error.visible { display: block; }

        .prompt-box {
            position: relative; margin: 15px auto 0; max-width: 650px;
            background: var(--bg-input); border: 1px solid var(--border); border-radius: 10px;
            padding: 0; overflow: hidden;
        }
        .prompt-header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 8px 14px; background: var(--bg-card); border-bottom: 1px solid var(--border);
        }
        .prompt-header span { font-family: var(--font-mono); font-size: 0.8rem; color: var(--accent); font-weight: 600; }
        .copy-btn {
            padding: 4px 12px; border: 1px solid var(--border); border-radius: 6px;
            background: var(--bg-secondary); color: var(--text-secondary); cursor: pointer;
            font-size: 0.75rem; font-weight: 500; transition: all 0.2s;
        }
        .copy-btn:hover { border-color: var(--accent); color: var(--accent); }
        .copy-btn.copied { border-color: var(--success); color: var(--success); }
        .prompt-content {
            padding: 14px 16px; font-family: var(--font-mono); font-size: 0.8rem;
            color: var(--text-primary); line-height: 1.6; white-space: pre-wrap; text-align: left;
            max-height: 200px; overflow-y: auto;
        }
        .prompt-content::-webkit-scrollbar { width: 5px; }
        .prompt-content::-webkit-scrollbar-track { background: transparent; }
        .prompt-content::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 3px; }

        .file-info { margin-top: 15px; padding: 8px 16px; background: var(--bg-input); border-radius: 8px; display: inline-block; font-family: var(--font-mono); font-size: 0.85rem; color: var(--success); }
        .upload-error { margin-top: 15px; padding: 8px 16px; background: rgba(255,51,102,0.1); border: 1px solid var(--error); border-radius: 8px; display: inline-block; font-family: var(--font-mono); font-size: 0.85rem; color: var(--error); }

        .btn { padding: 12px 28px; border: none; border-radius: 10px; font-family: system-ui, sans-serif; font-size: 0.95rem; font-weight: 600; cursor: pointer; transition: all 0.3s; display: inline-flex; align-items: center; gap: 8px; }
        .btn-primary { background: var(--accent); color: #fff; }
        .btn-primary:hover { background: var(--accent-hover); transform: translateY(-2px); box-shadow: 0 4px 15px var(--accent-glow); }
        .btn-secondary { background: var(--bg-card); color: var(--text-primary); border: 1px solid var(--border); }
        .btn-secondary:hover { border-color: var(--accent); background: var(--bg-input); }
        .btn-success { background: var(--success); color: #fff; }
        .btn-success:hover { opacity: 0.9; transform: translateY(-2px); }
        .btn-error { background: var(--error); color: #fff; }
        .btn-error:hover { opacity: 0.9; }
        .btn-warning { background: var(--warning); color: #000; }
        .btn-warning:hover { opacity: 0.9; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none !important; box-shadow: none; }
        .btn-group { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 20px; }

        .exercise-container { background: var(--bg-secondary); border-radius: 16px; padding: 30px; margin: 20px 0; border: 1px solid var(--border); animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity:0; transform:translateY(15px); } to { opacity:1; transform:translateY(0); } }
        .sentence-counter { font-family: var(--font-mono); font-size: 0.85rem; color: var(--accent); margin-bottom: 15px; }
        .russian-sentence { font-size: 1.3rem; font-weight: 600; margin-bottom: 25px; padding: 15px 20px; background: var(--bg-input); border-radius: 10px; border-left: 4px solid var(--accent); }
        .word-pool { display: flex; flex-wrap: wrap; gap: 10px; padding: 20px; background: var(--bg-input); border-radius: 12px; min-height: 70px; margin-bottom: 20px; border: 1px solid var(--border); }
        .word-chip { padding: 8px 18px; background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; font-size: 0.95rem; cursor: pointer; transition: all 0.2s; user-select: none; font-weight: 500; }
        .word-chip:hover { border-color: var(--accent); transform: translateY(-2px); box-shadow: 0 2px 10px var(--accent-glow); }
        .word-chip.used { opacity: 0.3; pointer-events: none; transform: scale(0.95); }
        .answer-area { min-height: 60px; padding: 20px; background: var(--bg-card); border-radius: 12px; border: 2px solid var(--border); display: flex; flex-wrap: wrap; gap: 10px; align-items: center; margin-bottom: 20px; transition: border-color 0.3s; }
        .answer-area.correct { border-color: var(--success); background: rgba(0,255,136,0.05); }
        .answer-area.incorrect { border-color: var(--error); background: rgba(255,51,102,0.05); }
        .answer-area .placeholder-text { color: var(--text-secondary); font-size: 0.9rem; font-style: italic; }
        .answer-word { padding: 8px 18px; background: var(--accent); color: #fff; border-radius: 8px; font-size: 0.95rem; cursor: pointer; transition: all 0.2s; font-weight: 600; animation: chipAppear 0.2s ease; }
        @keyframes chipAppear { from { opacity:0; transform:scale(0.8); } to { opacity:1; transform:scale(1); } }
        .answer-word:hover { opacity: 0.8; transform: scale(0.95); }
        .feedback { padding: 15px 20px; border-radius: 10px; margin: 15px 0; font-weight: 600; animation: fadeIn 0.3s ease; }
        .feedback.correct { background: rgba(0,255,136,0.1); border: 1px solid var(--success); color: var(--success); }
        .feedback.incorrect { background: rgba(255,51,102,0.1); border: 1px solid var(--error); color: var(--error); }
        .correct-answer-display { margin-top: 10px; padding: 10px 15px; background: var(--bg-input); border-radius: 8px; font-family: var(--font-mono); font-size: 0.95rem; color: var(--text-primary); }
        .progress-container { background: var(--bg-secondary); border-radius: 16px; padding: 30px; margin: 20px 0; border: 1px solid var(--border); animation: fadeIn 0.4s ease; }
        .progress-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; flex-wrap: wrap; gap: 15px; }
        .progress-header h2 { font-size: 1.4rem; }
        .progress-stats { font-family: var(--font-mono); font-size: 0.9rem; color: var(--accent); }
        .progress-bar-container { width: 100%; height: 8px; background: var(--bg-input); border-radius: 4px; margin-bottom: 25px; overflow: hidden; }
        .progress-bar { height: 100%; background: linear-gradient(90deg, var(--accent), var(--success)); border-radius: 4px; transition: width 0.5s ease; }
        .progress-list { display: flex; flex-direction: column; gap: 10px; max-height: 400px; overflow-y: auto; padding-right: 5px; }
        .progress-list::-webkit-scrollbar { width: 6px; }
        .progress-list::-webkit-scrollbar-track { background: var(--bg-input); border-radius: 3px; }
        .progress-list::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 3px; }
        .progress-item { display: flex; align-items: center; gap: 12px; padding: 12px 16px; background: var(--bg-card); border-radius: 10px; border: 1px solid var(--border); transition: all 0.3s; }
        .progress-item:hover { border-color: var(--accent); }
        .progress-item.completed { border-color: var(--success); background: rgba(0,255,136,0.03); }
        .progress-check { width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.9rem; flex-shrink: 0; }
        .progress-item.completed .progress-check { background: var(--success); color: #fff; }
        .theme-light .progress-item.completed .progress-check { color: #000; }
        .progress-item:not(.completed) .progress-check { background: var(--bg-input); border: 2px solid var(--border); color: var(--text-secondary); }
        .progress-item-text { flex: 1; font-size: 0.9rem; }
        .progress-item-text .ru { color: var(--text-secondary); font-size: 0.8rem; }
        .progress-item-text .en { font-weight: 500; }
        .nav-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 10px; }
        .back-btn { padding: 8px 16px; background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; color: var(--text-secondary); cursor: pointer; font-size: 0.85rem; transition: all 0.3s; display: flex; align-items: center; gap: 6px; }
        .back-btn:hover { border-color: var(--accent); color: var(--text-primary); }
        .screen { display: none; }
        .screen.active { display: block; }
        .completion-container { text-align: center; padding: 60px 30px; animation: fadeIn 0.5s ease; }
        .completion-container .emoji { font-size: 4rem; margin-bottom: 20px; }
        .completion-container h2 { font-size: 1.8rem; margin-bottom: 10px; background: linear-gradient(135deg, var(--accent), var(--success)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        .completion-container p { color: var(--text-secondary); margin-bottom: 30px; }
        .demo-btn { margin-top: 15px; font-size: 0.85rem; color: var(--accent); background: none; border: none; cursor: pointer; font-family: system-ui, sans-serif; text-decoration: underline; text-underline-offset: 3px; }
        .demo-btn:hover { opacity: 0.8; }

        /* AI Links Screen */
        .ai-container { background: var(--bg-secondary); border-radius: 16px; padding: 30px; margin: 20px 0; border: 1px solid var(--border); animation: fadeIn 0.4s ease; }
        .ai-container h2 { font-size: 1.4rem; margin-bottom: 8px; }
        .ai-container > p { color: var(--text-secondary); font-size: 0.9rem; margin-bottom: 25px; }
        .ai-category { margin-bottom: 25px; }
        .ai-category-title {
            font-size: 1rem; font-weight: 700; margin-bottom: 12px; padding-bottom: 8px;
            border-bottom: 2px solid var(--border); display: flex; align-items: center; gap: 8px;
        }
        .ai-category-title .flag { font-size: 1.2rem; }
        .ai-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 10px; }
        .ai-link {
            display: flex; align-items: center; gap: 12px; padding: 12px 16px;
            background: var(--bg-card); border: 1px solid var(--border); border-radius: 10px;
            text-decoration: none; color: var(--text-primary); transition: all 0.3s;
            cursor: pointer;
        }
        .ai-link:hover { border-color: var(--accent); transform: translateY(-2px); box-shadow: 0 4px 12px var(--accent-glow); }
        .ai-link-icon {
            width: 36px; height: 36px; border-radius: 8px; display: flex; align-items: center;
            justify-content: center; font-size: 1.2rem; flex-shrink: 0; background: var(--bg-input);
            border: 1px solid var(--border);
        }
        .ai-link-info { flex: 1; min-width: 0; }
        .ai-link-name { font-weight: 600; font-size: 0.9rem; margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .ai-link-desc { font-size: 0.75rem; color: var(--text-secondary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .ai-link-arrow { color: var(--accent); font-size: 0.8rem; flex-shrink: 0; opacity: 0.5; transition: opacity 0.3s; }
        .ai-link:hover .ai-link-arrow { opacity: 1; }

        .toast-container { position: fixed; top: 20px; right: 20px; z-index: 10000; display: flex; flex-direction: column; gap: 10px; pointer-events: none; }
        .toast { pointer-events: auto; padding: 12px 20px; border-radius: 10px; background: var(--bg-card); border: 1px solid var(--border); color: var(--text-primary); font-size: 0.9rem; box-shadow: 0 4px 20px rgba(0,0,0,0.4); animation: toastIn 0.3s ease forwards; max-width: 320px; }
        .toast.success { border-color: var(--success); color: var(--success); }
        .toast.error { border-color: var(--error); color: var(--error); }
        .toast.info { border-color: var(--accent); color: var(--accent); }
        .toast.fadeOut { animation: toastOut 0.3s ease forwards; }
        @keyframes toastIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }
        @keyframes toastOut { from { opacity: 1; transform: translateX(0); } to { opacity: 0; transform: translateX(20px); } }

        .hidden { display: none !important; }

        @media (max-width: 600px) {
            .app-container { padding: 10px; }
            .header h1 { font-size: 1.5rem; }
            .exercise-container, .progress-container, .ai-container { padding: 20px; }
            .btn { padding: 10px 18px; font-size: 0.85rem; }
            .word-chip, .answer-word { padding: 6px 14px; font-size: 0.85rem; }
            .ai-grid { grid-template-columns: 1fr; }
            .paste-textarea { min-height: 80px; }
        }
    </style>
</head>
<body>
    <div class="toast-container" id="toastContainer"></div>
    <div class="app-container" id="app"></div>

    <svg style="display:none">
        <symbol id="octocat" viewBox="0 0 16 16">
            <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/>
        </symbol>
        <symbol id="cyber-icon" viewBox="0 0 24 24">
            <path d="M13 2L3 14h8l-1 8 10-12h-8l1-8z"/>

    function showToast(message, type) {
        var container = document.getElementById('toastContainer');
        if (!container) return;
        var toast = document.createElement('div');
        toast.className = 'toast ' + (type || 'info');
        toast.textContent = message;
        container.appendChild(toast);
        setTimeout(function() {
            toast.classList.add('fadeOut');
            setTimeout(function() { if (toast.parentNode) toast.parentNode.removeChild(toast); }, 300);
        }, 3000);
    }

    function loadCompleted() {
        try { var raw = localStorage.getItem('et_completed'); if (raw) { var arr = JSON.parse(raw); if (Array.isArray(arr)) return new Set(arr.filter(function(s) { return typeof s === 'string' && s.length > 0; })); } } catch(e) {} return new Set();
    }
    function saveCompleted() { try { localStorage.setItem('et_completed', JSON.stringify(Array.from(State.completedSet))); } catch(e) {} }
    function clearCompleted() { try { localStorage.removeItem('et_completed'); } catch(e) {} State.completedSet = new Set(); }
    function markCompleted(englishText) { if (!State.completedSet.has(englishText)) { State.completedSet.add(englishText); saveCompleted(); } }
    function isCompleted(englishText) { return State.completedSet.has(englishText); }

    function esc(text) { var d = document.createElement('div'); d.textContent = text; return d.innerHTML; }
    function shuffle(arr) { var a = arr.slice(); for (var i = a.length - 1; i > 0; i--) { var j = Math.floor(Math.random() * (i + 1)); var temp = a[i]; a[i] = a[j]; a[j] = temp; } return a; }
    function stripPunctuation(str) { return str.replace(/[^\w\s]/g, '').replace(/\s+/g, ' ').trim(); }
    function parseData(text) {
        var lines = text.split(/\r?\n/).map(function(l) { return l.trim(); }).filter(function(l) { return l.length > 0; });
        var result = [];
        for (var i = 0; i + 2 < lines.length; i += 3) { result.push({ russian: lines[i], english: lines[i + 1], words: lines[i + 2].split(/\s+/).filter(function(w) { return w.length > 0; }) }); }
        return result;
    }

    function handleFile(file) {
        if (!file) return; State.uploadError = '';
        var reader = new FileReader();
        reader.onload = function(ev) {
            var parsed = parseData(ev.target.result);
            if (parsed.length === 0) { showToast(t('fileError'), 'error'); setState({ uploadError: t('fileErrorDetail') }); return; }
            clearCompleted(); showToast(parsed.length + t('loaded'), 'success');
            setState({ sentences: parsed, fileLoaded: true, fileInfo: file.name + ' (' + parsed.length + t('loaded').replace(/.*/, '') + ' предложений)', uploadError: '', pasteText: '', pasteParsedCount: 0 });
        };
        reader.onerror = function() { showToast(t('readFileError'), 'error'); setState({ uploadError: t('readFileError') }); };
        reader.readAsText(file, 'UTF-8');
    }

    function handlePasteParse(textareaEl) {
        var text = textareaEl ? textareaEl.value : State.pasteText;
        if (!text || text.trim().length === 0) { showToast(t('pasteNoData'), 'error'); return; }
        var parsed = parseData(text);
        if (parsed.length === 0) { showToast(t('pasteNoData'), 'error'); State.pasteParsedCount = 0; render(); return; }
        State.pasteParsedCount = parsed.length;
        State.sentences = parsed;
        State.fileLoaded = true;
        State.fileInfo = 'Paste (' + parsed.length + ' предложений)';
        State.uploadError = '';
        clearCompleted();
        showToast(t('pasteParsed').replace('{count}', parsed.length), 'success');
        render();

    function showCopied(btn) { btn.textContent = t('copied'); btn.classList.add('copied'); setTimeout(function() { btn.textContent = t('copy'); btn.classList.remove('copied'); }, 2000); }

    function updateAnswerArea() {
        var area = document.getElementById('answerArea'); if (!area) return;
        if (State.answerWords.length === 0) { area.innerHTML = '<span class="placeholder-text">' + t('placeholder') + '</span>'; }
        else { var html = ''; for (var k = 0; k < State.answerWords.length; k++) { html += '<div class="answer-word" data-pos="' + k + '">' + esc(State.answerWords[k].word) + '</div>'; } area.innerHTML = html; area.querySelectorAll('.answer-word').forEach(function(w) { w.addEventListener('click', function() { removeAnswerWordDirect(parseInt(this.getAttribute('data-pos'))); }); }); }
        area.className = 'answer-area';
    }
    function clearFeedback() { var fb = document.getElementById('feedbackArea'); if (fb) fb.innerHTML = ''; }
    function clearAnswer() { var chips = document.querySelectorAll('.word-chip'); for (var i = 0; i < chips.length; i++) chips[i].classList.remove('used'); State.answerWords = []; State.feedback = null; updateAnswerArea(); clearFeedback(); }

    function checkAnswer() {
        if (State.answerWords.length === 0) return;
        var currentSent = State.exerciseOrder[State.currentIndex];
        var userAns = stripPunctuation(State.answerWords.map(function(a) { return a.word; }).join(' '));
        var correctAns = stripPunctuation(currentSent.english);
        if (userAns.toLowerCase() === correctAns.toLowerCase()) {
            markCompleted(currentSent.english); State.feedback = { type: 'correct', text: t('correct') }; State.exerciseLocked = true;
            renderExerciseFeedback();
            setTimeout(function() { var next = State.currentIndex + 1; if (next >= State.exerciseOrder.length) { setState({ screen: 'completion' }); } else { var s = State.exerciseOrder[next]; setState({ currentIndex: next, shuffledWords: shuffle(s.words), answerWords: [], feedback: null, exerciseLocked: false }); } }, 1500);
        } else { State.feedback = { type: 'incorrect', text: t('incorrect'), answer: currentSent.english }; renderExerciseFeedback(); }
    }

    function renderExerciseFeedback() {
        var fb = document.getElementById('feedbackArea'); var aa = document.getElementById('answerArea'); if (!fb || !aa) return;

            '<div class="paste-results ' + pasteParsedVisible + '">' + pasteParsedText + '</div>' +
            '<div class="paste-error ' + (State.pasteParsedCount === 0 && State.pasteText && State.pasteText.trim().length > 0 ? 'visible' : '') + '">' + (State.pasteParsedCount === 0 && State.pasteText && State.pasteText.trim().length > 0 ? t('pasteNoData') : '') + '</div>' +
            '</div>' +
            PromptBox() +
            '<div style="text-align:center"><button class="demo-btn" data-action="loadDemo">' + t('demo') + '</button></div>' +
            '<div class="btn-group" style="justify-content:center; margin-top:25px;"><button class="btn btn-primary" data-action="startExercise" ' + dis + '>' + t('start') + '</button><button class="btn btn-secondary" data-action="goProgress" ' + dis + '>' + t('progress') + '</button></div>' +
            '</div>';
    }

    function ExerciseScreen() {
        var sent = State.exerciseOrder[State.currentIndex]; if (!sent) return '';
        var poolHtml = ''; for (var i = 0; i < State.shuffledWords.length; i++) { var used = false; for (var j = 0; j < State.answerWords.length; j++) { if (State.answerWords[j].posInShuffled === i) { used = true; break; } } poolHtml += '<div class="word-chip' + (used ? ' used' : '') + '" data-action="pickWord" data-word="' + esc(State.shuffledWords[i]) + '" data-pos="' + i + '">' + esc(State.shuffledWords[i]) + '</div>'; }
        var answerHtml = State.answerWords.length === 0 ? '<span class="placeholder-text">' + t('placeholder') + '</span>' : State.answerWords.map(function(aw, k) { return '<div class="answer-word" data-pos="' + k + '">' + esc(aw.word) + '</div>'; }).join('');
        var aClass = 'answer-area'; if (State.feedback) aClass += State.feedback.type === 'correct' ? ' correct' : ' incorrect';
        var fbHtml = State.feedback ? (State.feedback.type === 'correct' ? '<div class="feedback correct">' + State.feedback.text + '</div>' : '<div class="feedback incorrect">' + State.feedback.text + '<div class="correct-answer-display">' + esc(State.feedback.answer) + '</div></div>') : '';
        return '<div class="screen active">' + NavBar() + '<div class="exercise-container" id="exerciseContainer"><div class="sentence-counter">' + t('sentencesOf') + (State.currentIndex + 1) + t('of') + State.exerciseOrder.length + '</div><div class="russian-sentence">' + esc(sent.russian) + '</div><div class="word-pool" id="wordPool">' + poolHtml + '</div><div class="' + aClass + '" id="answerArea">' + answerHtml + '</div><div id="feedbackArea">' + fbHtml + '</div><div class="btn-group"><button class="btn btn-primary" data-action="checkAnswer"' + (State.exerciseLocked ? ' disabled' : '') + '>' + t('check') + '</button><button class="btn btn-warning" data-action="clearAnswer">' + t('clearAns') + '</button><button class="btn btn-secondary" data-action="showAnswer">' + t('showAnswer') + '</button><button class="btn btn-secondary" data-action="skipSentence">' + t('skip') + '</button></div></div></div>';
    }

    function ProgressScreen() {
        var total = State.sentences.length; var done = getCompletedCount(); var pct = total > 0 ? (done / total * 100) : 0;
        var items = ''; for (var idx = 0; idx < State.sentences.length; idx++) { var s = State.sentences[idx]; var isDone = isCompleted(s.english); items += '<div class="progress-item' + (isDone ? ' completed' : '') + '"><div class="progress-check">' + (isDone ? '✓' : (idx + 1)) + '</div><div class="progress-item-text"><div class="ru">' + esc(s.russian) + '</div><div class="en">' + esc(s.english) + '</div></div></div>'; }
        var allDone = done >= total;
        return '<div class="screen active"><div class="nav-bar"><button class="back-btn" data-action="goHome">' + t('backHome') + '</button></div><div class="progress-container"><div class="progress-header"><h2>' + t('progressTitle') + '</h2><div class="progress-stats">' + done + ' / ' + total + '</div></div><div class="progress-bar-container"><div class="progress-bar" style="width: ' + pct + '%"></div></div><div class="progress-list">' + items + '</div><div class="btn-group"><button class="btn btn-primary" data-action="startExercise"' + (allDone ? ' disabled' : '') + '>' + (allDone ? t('allDone') : t('launch')) + '</button><button class="btn btn-error" data-action="clearProgress">' + t('clearProgress') + '</button></div></div></div>';
    }

    function AIScreen() {
        var categories = [
            { key: 'global', label: t('aiGlobal'), flag: '🌍' },
            { key: 'chinese', label: t('aiChinese'), flag: '🇨🇳' },
            { key: 'russian', label: t('aiRussian'), flag: '🇷🇺' },
            { key: 'opensource', label: t('aiOpenSource'), flag: '💻' },
            { key: 'other', label: t('aiOther'), flag: '🌐' }
        ];
        var html = '';
        categories.forEach(function(cat) {
            var links = AI_LINKS.filter(function(l) { return l.cat === cat.key; });
            if (links.length === 0) return;
            html += '<div class="ai-category"><div class="ai-category-title"><span class="flag">' + cat.flag + '</span>' + cat.label + '</div><div class="ai-grid">';
            links.forEach(function(link) {
                html += '<a class="ai-link" href="' + link.url + '" target="_blank" rel="noopener noreferrer">' +
                    '<div class="ai-link-icon">' + link.icon + '</div>' +
                    '<div class="ai-link-info"><div class="ai-link-name">' + link.name + '</div><div class="ai-link-desc">' + link.desc + '</div></div>' +
                    '<span class="ai-link-arrow">→</span>' +
                    '</a>';
            });
            html += '</div></div>';
        });
        return '<div class="screen active"><div class="nav-bar"><button class="back-btn" data-action="goHome">' + t('backHome') + '</button></div><div class="ai-container"><h2>' + t('aiTitle') + '</h2><p>' + t('aiSubtitle') + '</p>' + html + '</div></div>';
    }

    function CompletionScreen() { return '<div class="screen active"><div class="completion-container"><div class="emoji">🎉</div><h2>' + t('congrats') + '</h2><p>' + t('congratsText') + '</p><div class="btn-group" style="justify-content:center;"><button class="btn btn-primary" data-action="goHome">' + t('backHome') + '</button><button class="btn btn-secondary" data-action="goProgress">' + t('progress') + '</button><button class="btn btn-success" data-action="restartExercise">' + t('restart') + '</button></div></div></div>'; }

    function render() {
        var app = document.getElementById('app');
        var screens = { home: HomeScreen(), exercise: ExerciseScreen(), progress: ProgressScreen(), completion: CompletionScreen(), ai: AIScreen() };
        app.innerHTML = Header() + screens[State.screen]; bindEvents();
    }

    function bindEvents() {
        var fileInput = document.getElementById('fileInput'); if (fileInput) fileInput.onchange = function(e) { handleFile(e.target.files[0]); };
        var uploadArea = document.querySelector('.upload-area'); if (uploadArea) { uploadArea.ondragover = function(e) { e.preventDefault(); uploadArea.classList.add('dragover'); }; uploadArea.ondragleave = function(e) { e.preventDefault(); uploadArea.classList.remove('dragover'); }; uploadArea.ondrop = function(e) { e.preventDefault(); uploadArea.classList.remove('dragover'); if (e.dataTransfer.files.length > 0) handleFile(e.dataTransfer.files[0]); }; }

        // Paste textarea events
        var pasteTextarea = document.getElementById('pasteTextarea');
        if (pasteTextarea) {
            pasteTextarea.oninput = function() {
                State.pasteText = this.value;
                var pasteArea = this.closest('.paste-area');
                if (pasteArea) {
                    if (this.value && this.value.trim().length > 0) {
                        pasteArea.classList.add('has-content');
                        var parseBtn = document.getElementById('parsePasteBtn');
                        if (parseBtn) parseBtn.disabled = false;
                    } else {
                        pasteArea.classList.remove('has-content');
                        var parseBtn2 = document.getElementById('parsePasteBtn');
                        if (parseBtn2) parseBtn2.disabled = true;
                    }
                }
            };
            // Auto-parse on paste
            pasteTextarea.onpaste = function() {
                setTimeout(function() {
                    var text = pasteTextarea.value;
                    if (text && text.trim().length > 0) {
                        State.pasteText = text;
                        handlePasteParse(pasteTextarea);
                    }
                }, 100);
            };
        }

        document.querySelectorAll('.word-chip[data-action="pickWord"]').forEach(function(chip) { chip.addEventListener('click', function() { if (!State.exerciseLocked) pickWordDirect(this.getAttribute('data-word'), parseInt(this.getAttribute('data-pos')), this); }); });
        document.querySelectorAll('.answer-word').forEach(function(w) { w.addEventListener('click', function() { if (!State.exerciseLocked) removeAnswerWordDirect(parseInt(this.getAttribute('data-pos'))); }); });
        document.querySelectorAll('[data-action]').forEach(function(el) { var action = el.getAttribute('data-action'); if (action === 'pickWord') return; el.onclick = function(e) { e.preventDefault(); e.stopPropagation(); handleAction(action, el); }; });
    }

    function handleAction(action, el) {
        switch (action) {
            case 'goHome': setState({ screen: 'home' }); break;
            case 'goProgress': setState({ screen: 'progress' }); break;
            case 'goAi': setState({ screen: 'ai' }); break;
            case 'startExercise': startExercise(); break;
            case 'loadDemo': loadDemo(); break;
            case 'clearProgress': handleClearProgress(); break;
            case 'restartExercise': restartExercise(); break;
            case 'checkAnswer': checkAnswer(); break;
            case 'clearAnswer': clearAnswer(); break;
            case 'showAnswer': showAnswer(); break;
            case 'skipSentence': skipSentence(); break;
            case 'parsePaste':
                var ta = document.getElementById('pasteTextarea');
                handlePasteParse(ta);
                break;
        }
    }

    State.completedSet = loadCompleted();
    document.body.className = 'theme-' + State.theme;
    render();
    </script>
</body>
</html>
