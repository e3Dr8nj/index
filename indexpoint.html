<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shell App (Markdown Preview)</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root {
            --bg-primary: #0d1117; --bg-secondary: #161b22; --bg-tertiary: #21262d;
            --text-primary: #e6edf3; --text-secondary: #8b949e;
            --accent: #58a6ff; --accent-hover: #79b8ff;
            --border: #30363d; --shadow: rgba(0,0,0,0.4);
            --card-hover: rgba(88,166,255,0.05);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            background: var(--bg-primary); color: var(--text-primary);
            height: 100vh; display: flex; flex-direction: column; overflow: hidden;
        }

        /* === ШАПКА === */
        header {
            background: var(--bg-secondary); border-bottom: 1px solid var(--border);
            padding: 0 20px; height: 64px; flex-shrink: 0;
            display: flex; align-items: center; z-index: 100;
        }
        .header-inner { max-width: 1280px; width: 100%; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; }
        .logo { font-weight: 700; font-size: 18px; color: #fff; display: flex; align-items: center; gap: 10px; cursor: pointer; }
        .logo svg { fill: #fff; }
        .btn-back {
            background: transparent; border: 1px solid var(--border); color: var(--text-primary);
            padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 14px;
            display: none; transition: 0.2s;
        }
        .btn-back:hover { background: var(--bg-tertiary); border-color: var(--text-secondary); }

        /* === ОСНОВНАЯ ОБЛАСТЬ === */
        main { flex: 1; position: relative; overflow: hidden; background: var(--bg-primary); }
        .menu-screen { position: absolute; inset: 0; overflow-y: auto; padding: 32px 20px; max-width: 1280px; margin: 0 auto; width: 100%; }
        .iframe-screen { position: absolute; inset: 0; width: 100%; height: 100%; border: none; background: var(--bg-primary); display: none; }

        /* === КАРТОЧКИ === */
        .grid-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 16px; margin-top: 24px; }
        .folder-card {
            background: var(--bg-secondary); border: 1px solid var(--border); border-radius: 12px;
            cursor: pointer; transition: all 0.2s;
            display: flex; flex-direction: column; position: relative;
        }
        .folder-card:hover { border-color: var(--accent); background: var(--card-hover); transform: translateY(-3px); box-shadow: 0 8px 20px var(--shadow); }
        .card-inner { padding: 20px; }
        
        .card-header { display: flex; align-items: center; gap: 12px; }
        .module-icon {
            width: 56px; height: 56px; border-radius: 10px; overflow: hidden; flex-shrink: 0;
            background: var(--bg-tertiary); border: 1px solid var(--border);
            display: flex; align-items: center; justify-content: center;
        }
        .module-icon img { width: 100%; height: 100%; object-fit: cover; }
        .module-icon .default-icon { font-size: 28px; }
        .card-title { flex: 1; min-width: 0; }
        .folder-name { font-weight: 600; font-size: 16px; color: var(--text-primary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .folder-hint { font-size: 11px; color: var(--text-secondary); font-family: monospace; }

        /* КНОПКА РАЗВЕРНУТЬ (в углу) */
        .expand-btn {
            position: absolute; top: 12px; right: 12px;
            width: 28px; height: 28px; border-radius: 6px;
            background: var(--bg-tertiary); border: 1px solid var(--border);
            color: var(--text-secondary); cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.2s; font-size: 14px; z-index: 5;
        }
        .expand-btn:hover { background: var(--accent); color: #fff; border-color: var(--accent); transform: scale(1.1); }

        /* Описание (Свернутое) */
        .module-preview {
            font-size: 13px; color: var(--text-secondary); line-height: 1.5;
            margin-top: 8px;
            white-space: pre-wrap; /* Сохраняет переносы строк */
            display: -webkit-box;
            -webkit-line-clamp: 2; /* Только 2 строки */
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        /* МОДАЛЬНОЕ ОКНО */
        .modal-overlay {
            position: fixed; inset: 0; z-index: 1000;
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(4px);
            display: none; align-items: center; justify-content: center; padding: 20px;
            animation: fadeInModal 0.2s ease;
        }
        .modal-overlay.active { display: flex; }
        @keyframes fadeInModal { from { opacity: 0; } to { opacity: 1; } }

        .modal-box {
            background: var(--bg-secondary); border: 1px solid var(--border); border-radius: 16px;
            width: 100%; max-width: 700px; max-height: 85vh;
            display: flex; flex-direction: column; box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            animation: slideUp 0.25s ease;
        }
        @keyframes slideUp { from { transform: translateY(30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        .modal-header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 16px 20px; border-bottom: 1px solid var(--border); flex-shrink: 0;
        }
        .modal-title { font-weight: 600; font-size: 16px; color: var(--accent); }
        .modal-close {
            width: 32px; height: 32px; border-radius: 8px;
            background: transparent; border: 1px solid var(--border);
            color: var(--text-secondary); cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            font-size: 18px; transition: 0.2s;
        }
        .modal-close:hover { background: var(--error); color: #fff; border-color: var(--error); }

        /* Стили Markdown внутри модалки */
        .modal-body { padding: 24px; overflow-y: auto; }
        .modal-body h1, .modal-body h2, .modal-body h3, .modal-body h4 { margin: 24px 0 16px; font-weight: 600; line-height: 1.25; color: var(--text-primary); }
        .modal-body h1 { font-size: 2em; border-bottom: 1px solid var(--border); padding-bottom: 0.3em; }
        .modal-body h2 { font-size: 1.5em; border-bottom: 1px solid var(--border); padding-bottom: 0.3em; }
        .modal-body h3 { font-size: 1.25em; }
        .modal-body p { margin-bottom: 16px; color: var(--text-secondary); }
        .modal-body a { color: var(--accent); text-decoration: none; }
        .modal-body a:hover { text-decoration: underline; }
        .modal-body code { background: var(--bg-tertiary); padding: 0.2em 0.4em; border-radius: 6px; font-family: monospace; font-size: 85%; }
        .modal-body pre { background: var(--bg-primary); padding: 16px; border-radius: 8px; overflow-x: auto; margin-bottom: 16px; border: 1px solid var(--border); }
        .modal-body pre code { background: transparent; padding: 0; font-size: 100%; color: var(--text-primary); }
        .modal-body blockquote { border-left: 0.25em solid var(--accent); padding: 0 1em; margin: 0 0 16px 0; color: var(--text-secondary); font-style: italic; }
        .modal-body ul, .modal-body ol { padding-left: 2em; margin-bottom: 16px; }
        .modal-body li { margin-bottom: 0.25em; color: var(--text-secondary); }
        .modal-body img { max-width: 100%; border-radius: 6px; }
        .modal-body hr { border: 0; border-top: 1px solid var(--border); margin: 24px 0; }
        .modal-body strong { color: var(--text-primary); }

        /* Статусы */
        .empty-state { text-align: center; padding: 60px 20px; color: var(--text-secondary); }
        .loader { width: 32px; height: 32px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <header>
        <div class="header-inner">
            <div class="logo" onclick="goHome()">
                <image src="Group 35.png"></image>
                <!--
                <svg width="28" height="28" viewBox="0 0 16 16" fill="currentColor"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/></svg>
                -->
                Shell App
            </div>
            <button class="btn-back" id="btnBackToMenu" onclick="goHome()">← Назад к списку</button>
        </div>
    </header>

    <main>
        <div id="menuScreen" class="menu-screen">
            <div id="loadingMsg" class="empty-state">
                <div class="loader"></div>
                <p>Проверка модулей...</p>
            </div>
            <div id="folderGrid" class="grid-list" style="display:none;"></div>
        </div>
        <iframe id="contentFrame" class="iframe-screen" src="about:blank"></iframe>
    </main>

    <!-- МОДАЛЬНОЕ ОКНО -->
    <div id="modal" class="modal-overlay" onclick="if(event.target===this) closeModal()">
        <div class="modal-box">
            <div class="modal-header">
                <span class="modal-title" id="modalTitle">Описание</span>
                <button class="modal-close" onclick="closeModal()">×</button>
            </div>
            <div class="modal-body" id="modalBody"></div>
        </div>
    </div>

    <script>
        const menuScreen = document.getElementById('menuScreen');
        const contentFrame = document.getElementById('contentFrame');
        const btnBack = document.getElementById('btnBackToMenu');
        const folderGrid = document.getElementById('folderGrid');
        const loadingMsg = document.getElementById('loadingMsg');
        const modal = document.getElementById('modal');
        const modalTitle = document.getElementById('modalTitle');
        const modalBody = document.getElementById('modalBody');

        // Настройка marked
        marked.setOptions({ gfm: true, breaks: true });

        function showMenu() { menuScreen.style.display = 'block'; contentFrame.style.display = 'none'; btnBack.style.display = 'none'; }
        function loadModule(url) { menuScreen.style.display = 'none'; contentFrame.style.display = 'block'; btnBack.style.display = 'block'; contentFrame.src = url; }
        function goHome() { contentFrame.src = 'about:blank'; showMenu(); init(); }

        // Модалка
        window.openModal = function(title, htmlContent) { 
            modalTitle.textContent = title; 
            modalBody.innerHTML = htmlContent; 
            modal.classList.add('active'); 
        };
        window.closeModal = function() { modal.classList.remove('active'); };
        document.addEventListener('keydown', e => { if(e.key === 'Escape') closeModal(); });

        // Хранилище полных текстов для модалок
        window.DESC_FULL = {};

        // Утилиты
        async function fileExists(path) { try { return (await fetch(path, { method: 'HEAD' })).ok; } catch { return false; } }
        async function getFileText(path) { try { const res = await fetch(path); return res.ok ? await res.text() : null; } catch { return null; } }
        async function getDirLinks(path) {
            try {
                const res = await fetch(path);
                if (!res.ok) return [];
                return Array.from(new DOMParser().parseFromString(await res.text(), 'text/html').querySelectorAll('a'))
                            .map(a => a.getAttribute('href'));
            } catch { return []; }
        }

        async function init() {
            loadingMsg.style.display = 'block';
            loadingMsg.innerHTML = `<div class="loader"></div><p>Проверка модулей...</p>`;
            folderGrid.style.display = 'none';
            folderGrid.innerHTML = '';

            const links = await getDirLinks('modules/');
            // Фильтруем только папки (не файлы)
            const folderNames = [...new Set(links
                .filter(l => l && l !== '.' && l !== '..' && (l.endsWith('/') || !l.includes('.')))
                .map(l => l.replace(/\/$/, '').split('/').pop())
                .filter(n => n && n !== 'modules')
            )];

            if (folderNames.length === 0) {
                folderGrid.innerHTML = `<div class="empty-state" style="grid-column:1/-1;"><h3>📂 Папка modules/ пуста</h3></div>`;
            } else {
                const modules = await Promise.all(folderNames.map(async (name) => {
                    const folderPath = `modules/${name}/`;
                    let iconUrl = null;
                    let description = null;

                    // 1. Ищем описание (describe.md или describe.txt)
                    const md = await getFileText(`${folderPath}describe.md`);
                    const txt = await getFileText(`${folderPath}describe.txt`);
                    
                    let descData = null;
                    if (md) {
                        descData = { text: md, isMd: true };
                    } else if (txt) {
                        descData = { text: txt, isMd: false };
                    }

                    // 2. Ищем иконку
                    for (const ext of ['png', 'jpg', 'jpeg', 'gif', 'svg', 'webp', 'bmp']) {
                        if (await fileExists(`${folderPath}megaicon.${ext}`)) {
                            iconUrl = `${folderPath}megaicon.${ext}`;
                            break;
                        }
                    }

                    return { name, url: `${folderPath}index.html`, iconUrl, description: descData };
                }));

                renderModules(modules);
            }
            loadingMsg.style.display = 'none';
            folderGrid.style.display = 'grid';
        }

        function renderModules(modules) {
            modules.forEach(mod => {
                const card = document.createElement('div');
                card.className = 'folder-card';
                card.onclick = (e) => { if (!e.target.closest('.expand-btn')) loadModule(mod.url); };

                // Иконка
                let iconHtml = mod.iconUrl 
                    ? `<div class="module-icon"><img src="${mod.iconUrl}" alt="icon"></div>`
                    : `<div class="module-icon"><span class="default-icon">🌐</span></div>`;

                let descHtml = '';
                let expandBtnHtml = '';

                if (mod.description) {
                    const fullText = mod.description.text;
                    const isMd = mod.description.isMd;

                    // Сохраняем полный текст в глобальный объект для модалки
                    const storageId = `desc_${mod.name}`;
                    window.DESC_FULL[storageId] = fullText;
                    
                    // Готовим превью: первые 2 строки, экранированные от HTML
                    const firstTwoLines = fullText.split('\n').slice(0, 2).join('\n');
                    const safeText = firstTwoLines.replace(/</g, '&lt;').replace(/>/g, '&gt;');

                    descHtml = `<div class="module-preview">${safeText}</div>`;
                    
                    // Кнопка вызывает функцию по ID
                    expandBtnHtml = `<button class="expand-btn" onclick="showFullDesc('${storageId}', '${mod.name}', ${isMd})" title="Развернуть описание">↗</button>`;
                }

                card.innerHTML = `
                    <div class="card-inner">
                        ${expandBtnHtml}
                        <div class="card-header">
                            ${iconHtml}
                            <div class="card-title">
                                <div class="folder-name">${mod.name}</div>
                                <div class="folder-hint">modules/${mod.name}/</div>
                            </div>
                        </div>
                        ${descHtml}
                    </div>
                `;
                folderGrid.appendChild(card);
            });
        }

        // Функция показа полного описания (вызывается из onclick)
        window.showFullDesc = function(storageId, name, isMd) {
            const text = window.DESC_FULL[storageId];
            if (!text) return;

            let htmlContent;
            if (isMd) {
                // Если Markdown - парсим через marked
                htmlContent = marked.parse(text);
            } else {
                // Если текст - просто переносим строки
                htmlContent = `<p style="white-space: pre-wrap; color: var(--text-secondary);">${text.replace(/</g, '&lt;')}</p>`;
            }

            openModal(name, htmlContent);
        };

        window.addEventListener('load', init);
    </script>
</body>
</html>
